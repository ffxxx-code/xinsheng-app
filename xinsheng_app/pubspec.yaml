name: xinsheng
description: 心声 - 极简笔记社区 Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  firebase_crashlytics: ^3.4.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0
  
  # Navigation
  go_router: ^13.0.1
  
  # Utils
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  timeago: ^3.6.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  image_picker: ^1.0.7
  permission_handler: ^11.2.0
  
  # Notifications & Share
  flutter_local_notifications: ^16.3.2
  share_plus: ^7.2.2
  
  # Animation
  animations: ^2.0.11
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/avatars/
